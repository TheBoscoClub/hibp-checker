name: "Python Security & Quality"

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC

# Explicit permissions for security best practices
permissions:
  contents: read

jobs:
  ruff:
    name: Ruff Linting
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - uses: astral-sh/ruff-action@4919ec5cf1f49eff0871dbcea0da843445b837e6  # v3
      with:
        args: "check --output-format=github"

  mypy:
    name: Type Checking
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: '3.14'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mypy
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Run mypy
      run: |
        mypy . --ignore-missing-imports --no-error-summary || echo "::warning::Type errors found"
      continue-on-error: true

  bandit:
    name: Security Scan (Bandit)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: '3.14'
    
    - name: Install Bandit
      run: pip install bandit[toml]
    
    - name: Run Bandit
      run: |
        bandit -r . -x ./tests,./test,./venv,./.venv -f json -o bandit-report.json || true
        bandit -r . -x ./tests,./test,./venv,./.venv -f txt || echo "::warning::Security issues found"
      continue-on-error: true
    
    - name: Upload Bandit Report
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
      if: always()
      with:
        name: bandit-security-report
        path: bandit-report.json

  pip-audit:
    name: Dependency Vulnerabilities
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: '3.14'
    
    - name: Install pip-audit
      run: pip install pip-audit
    
    - name: Run pip-audit
      run: |
        if [ -f requirements.txt ]; then
          pip-audit -r requirements.txt --desc || echo "::warning::Vulnerable dependencies found"
        else
          echo "No requirements.txt found, skipping"
        fi
      continue-on-error: true
